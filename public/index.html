<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Udemy Course Scraper</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.5;
      }

      h1 {
        margin-bottom: 20px;
      }

      .section {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 18px;
        margin: 20px 0;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        font-weight: bold;
      }

      input,
      textarea {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }

      textarea {
        min-height: 180px;
        font-family: monospace;
      }

      button {
        padding: 10px 18px;
        font-size: 16px;
        cursor: pointer;
      }

      #message {
        margin-top: 15px;
        font-weight: bold;
      }

      #progressPanel {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #f7f7f7;
      }

      #progressPanel div {
        margin: 5px 0;
      }

      #progressBarOuter {
        width: 100%;
        height: 20px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 12px;
      }

      #progressBarInner {
        height: 100%;
        width: 0%;
        background: #333;
        transition: width 0.3s ease;
      }

      #etaNote {
        font-size: 13px;
        color: #666;
        margin-top: 8px;
      }

      #currentUrlText {
        word-break: break-all;
      }

      #output {
        margin-top: 20px;
        padding: 15px;
        background: #111;
        color: #eee;
        white-space: pre-wrap;
        border-radius: 8px;
        min-height: 120px;
      }
    </style>
  </head>

  <body>
    <h1>Udemy Course Scraper</h1>

    <div class="section">
      <h2>Course URLs</h2>

      <label for="urls">One Udemy course URL per line</label>
      <textarea id="urls"></textarea>
    </div>

    <div class="section">
      <h2>Run Settings</h2>

      <label for="courseDelayMin">Course delay min ms</label>
      <input id="courseDelayMin" type="number" min="0" />

      <label for="courseDelayMax">Course delay max ms</label>
      <input id="courseDelayMax" type="number" min="0" />

      <label for="instructorDelayMin">Instructor delay min ms</label>
      <input id="instructorDelayMin" type="number" min="0" />

      <label for="instructorDelayMax">Instructor delay max ms</label>
      <input id="instructorDelayMax" type="number" min="0" />

      <label for="retryDelayMin">Retry delay min ms</label>
      <input id="retryDelayMin" type="number" min="0" />

      <label for="retryDelayMax">Retry delay max ms</label>
      <input id="retryDelayMax" type="number" min="0" />
    </div>

    <button id="runButton">Run scraper</button>

    <div id="message"></div>

    <div id="progressPanel">
      <div><strong>Progress:</strong> <span id="progressText">0 / 0</span></div>
      <div><strong>Successful:</strong> <span id="successText">0</span></div>
      <div><strong>Failed:</strong> <span id="failedText">0</span></div>
      <div><strong>Elapsed:</strong> <span id="elapsedText">0s</span></div>
      <div>
        <strong>Estimated total:</strong> <span id="estimatedTotalText">-</span>
      </div>
      <div>
        <strong>Estimated remaining:</strong>
        <span id="estimatedRemainingText">-</span>
      </div>
      <div><strong>Status:</strong> <span id="statusText">Waiting</span></div>
      <div>
        <strong>Current URL:</strong> <span id="currentUrlText">-</span>
      </div>

      <div id="progressBarOuter">
        <div id="progressBarInner"></div>
      </div>

      <div id="etaNote">ETA assumes no retries or blocks.</div>
    </div>

    <pre id="output"></pre>

    <script>
      async function loadData() {
        const [configResponse, urlsResponse] = await Promise.all([
          fetch("/api/config"),
          fetch("/api/urls"),
        ]);

        const config = await configResponse.json();
        const urlsData = await urlsResponse.json();

        document.getElementById("urls").value = urlsData.urls || "";

        document.getElementById("courseDelayMin").value =
          config.COURSE_DELAY_MIN_MS || 20000;
        document.getElementById("courseDelayMax").value =
          config.COURSE_DELAY_MAX_MS || 40000;

        document.getElementById("instructorDelayMin").value =
          config.INSTRUCTOR_DELAY_MIN_MS || 10000;
        document.getElementById("instructorDelayMax").value =
          config.INSTRUCTOR_DELAY_MAX_MS || 20000;

        document.getElementById("retryDelayMin").value =
          config.RETRY_DELAY_MIN_MS || 120000;
        document.getElementById("retryDelayMax").value =
          config.RETRY_DELAY_MAX_MS || 180000;
      }

      let progressTimer = null;
      let runStartedAtMs = null;
      let fixedEstimatedTotalMs = null;
      let latestProgress = null;

      function formatDuration(ms) {
        const totalSeconds = Math.max(0, Math.round(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        if (hours > 0) {
          return `${hours}h ${minutes}m ${seconds}s`;
        }

        if (minutes > 0) {
          return `${minutes}m ${seconds}s`;
        }

        return `${seconds}s`;
      }

      function updateProgress(progress) {
        latestProgress = progress;

        if (runStartedAtMs === null) {
          runStartedAtMs = Date.now() - progress.elapsedMs;
        }

        if (fixedEstimatedTotalMs === null) {
          fixedEstimatedTotalMs = progress.estimatedTotalMs;
        }

        const percent =
          progress.totalCourses > 0
            ? Math.min(
                100,
                Math.round(
                  (progress.completedCount / progress.totalCourses) * 100,
                ),
              )
            : 0;

        document.getElementById("progressText").textContent =
          `${progress.completedCount} / ${progress.totalCourses} (${percent}%)`;

        document.getElementById("successText").textContent =
          progress.successCount;
        document.getElementById("failedText").textContent =
          progress.failedCount;
        document.getElementById("estimatedTotalText").textContent =
          formatDuration(fixedEstimatedTotalMs);
        document.getElementById("statusText").textContent = progress.status;
        document.getElementById("currentUrlText").textContent =
          progress.currentUrl || "-";

        document.getElementById("progressBarInner").style.width = `${percent}%`;

        updateLiveTimer();
      }

      function updateLiveTimer() {
        if (runStartedAtMs === null || fixedEstimatedTotalMs === null) {
          return;
        }

        const elapsedMs = Date.now() - runStartedAtMs;

        const runIsFinished =
          latestProgress &&
          latestProgress.totalCourses > 0 &&
          latestProgress.completedCount >= latestProgress.totalCourses;

        const remainingMs = runIsFinished
          ? 0
          : Math.max(0, fixedEstimatedTotalMs - elapsedMs);

        document.getElementById("elapsedText").textContent =
          formatDuration(elapsedMs);

        document.getElementById("estimatedRemainingText").textContent =
          formatDuration(remainingMs);
      }

      async function runScraper() {
        const config = {
          COURSE_DELAY_MIN_MS: Number(
            document.getElementById("courseDelayMin").value,
          ),
          COURSE_DELAY_MAX_MS: Number(
            document.getElementById("courseDelayMax").value,
          ),

          INSTRUCTOR_DELAY_MIN_MS: Number(
            document.getElementById("instructorDelayMin").value,
          ),
          INSTRUCTOR_DELAY_MAX_MS: Number(
            document.getElementById("instructorDelayMax").value,
          ),

          RETRY_DELAY_MIN_MS: Number(
            document.getElementById("retryDelayMin").value,
          ),
          RETRY_DELAY_MAX_MS: Number(
            document.getElementById("retryDelayMax").value,
          ),
        };

        const urls = document.getElementById("urls").value;

        const message = document.getElementById("message");
        const output = document.getElementById("output");
        const runButton = document.getElementById("runButton");

        message.textContent = "Scraper is running...";
        message.style.color = "black";
        output.textContent = "";
        runButton.disabled = true;

        runStartedAtMs = null;
        fixedEstimatedTotalMs = null;
        latestProgress = null;

        if (progressTimer) {
          clearInterval(progressTimer);
        }

        progressTimer = setInterval(updateLiveTimer, 1000);

        try {
          const response = await fetch("/api/run", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ config, urls }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            message.textContent = "Scraper could not start.";
            message.style.color = "red";
            output.textContent = errorText;
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();

            if (done) {
              break;
            }

            const chunk = decoder.decode(value, { stream: true });
            buffer += chunk;

            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (line.startsWith("__PROGRESS__ ")) {
                const jsonText = line.replace("__PROGRESS__ ", "");

                try {
                  const progress = JSON.parse(jsonText);
                  updateProgress(progress);
                } catch (error) {
                  output.textContent += line + "\n";
                }
              } else {
                output.textContent += line + "\n";
              }
            }

            output.scrollTop = output.scrollHeight;
          }

          if (buffer) {
            output.textContent += buffer;
          }

          message.textContent = "Scraper finished.";
          message.style.color = "green";
        } catch (error) {
          message.textContent = "Could not run scraper.";
          message.style.color = "red";
          output.textContent = error.message;
        } finally {
          if (progressTimer) {
            clearInterval(progressTimer);
            progressTimer = null;
          }

          updateLiveTimer();
          runButton.disabled = false;
        }
      }

      document
        .getElementById("runButton")
        .addEventListener("click", runScraper);

      loadData();
    </script>
  </body>
</html>
